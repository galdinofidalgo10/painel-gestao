<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gestão Administrativa</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; padding: 20px; }
        h1 { color: #d4af37; text-align: center; text-transform: uppercase; border-bottom: 2px solid #d4af37; padding-bottom: 10px; }
        .usuario-card { background: #111; border: 1px solid #333; padding: 15px; margin-bottom: 10px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; }
        .btn-acao { background: #d4af37; color: #000; border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        b { color: #d4af37; }
    </style>
</head>
<body>

    <h1>Painel de Controlo - Gestão</h1>
    <div id="dados-firebase">A carregar registos...</div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // Use a chave que aparece no seu console do Firebase agora
        const firebaseConfig = {
            apiKey: "AIzaSyCzTpvbMjGMTUIxMbZJjd_Kydas", // Verifique se esta chave foi atualizada no painel
            authDomain: "ajuda-mutua-7d99a.firebaseapp.com",
            projectId: "ajuda-mutua-7d99a",
            storageBucket: "ajuda-mutua-7d99a.appspot.com",
            databaseURL: "https://ajuda-mutua-7d99a-default-rtdb.firebaseio.com/"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }

        const db = firebase.database();

        // Esta função lê a pasta onde o seu index.html guarda os dados
        db.ref('solicitacoes').on('value', (snapshot) => {
            const container = document.getElementById('dados-firebase');
            container.innerHTML = "";

            if (!snapshot.exists()) {
                container.innerHTML = "Nenhum registo encontrado.";
                return;
            }

            snapshot.forEach((child) => {
                const user = child.val();
                container.innerHTML += `
                    <div class="usuario-card">
                        <div>
                            <p><b>Nome:</b> ${user.nome}</p>
                            <p><b>Pix:</b> ${user.chavePix}</p>
                        </div>
                        <button class="btn-acao" onclick="liberar('${child.key}')">LIBERAR SALA</button>
                    </div>
                `;
            });
        });

        function liberar(id) {
            if(confirm("Confirmar libertação do utilizador?")) {
                db.ref('solicitacoes/' + id).update({ status: "Liberado" });
                alert("Utilizador atualizado!");
            }
        }
    </script>
</body>
</html>
