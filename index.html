<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Gestão | Protocolo Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #020617; color: #f8fafc; font-family: 'Montserrat', sans-serif; }
        .glass-card { background: rgba(15, 23, 42, 0.95); border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 20px; }
        .thumb-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        .thumb { aspect-ratio: 3/4; border-radius: 8px; overflow: hidden; border: 1px solid #b8860b; cursor: zoom-in; }
        .thumb img { width: 100%; height: 100%; object-fit: cover; }
        #modalZoom { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; align-items: center; justify-content: center; }
        .btn-zap { background: linear-gradient(135deg, #25d366 0%, #128c7e 100%); font-weight: 900; }
    </style>
</head>
<body class="p-4">
    <div id="modalZoom" onclick="this.style.display='none'"><img id="imgFull" class="max-w-[90%] max-h-[80vh] border-2 border-yellow-500 rounded-lg"></div>

    <div class="max-w-xl mx-auto">
        <header class="flex justify-between items-center mb-8 pb-4 border-b border-white/10">
            <h1 class="text-xl font-black text-yellow-500 uppercase italic">Gestão Elite</h1>
            <div class="text-right"><span id="contador" class="text-2xl font-black">0</span><p class="text-[8px] text-yellow-500 uppercase">Fila</p></div>
        </header>

        <div id="listaSolicitacoes" class="space-y-6">
            <p class="text-center text-slate-500 animate-pulse">Carregando solicitações...</p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCZIP0M0M8FqC_LAtI9I36e_IIn_V-C4m4",
            authDomain: "ajuda-mutua-7d99a.firebaseapp.com",
            databaseURL: "https://ajuda-mutua-7d99a-default-rtdb.firebaseio.com",
            projectId: "ajuda-mutua-7d99a",
            storageBucket: "ajuda-mutua-7d99a.appspot.com",
            appId: "1:1070775313117:web:fa90f5f0cb519ab38b1d34"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function ver(u) { document.getElementById('imgFull').src = u; document.getElementById('modalZoom').style.display = 'flex'; }

        database.ref('solicitacoes/').on('value', (snapshot) => {
            const container = document.getElementById('listaSolicitacoes');
            container.innerHTML = ""; let count = 0;
            const dados = snapshot.val() || {};

            Object.keys(dados).reverse().forEach(id => {
                const s = dados[id];
                if(s.status === 'pendente') {
                    count++;
                    container.innerHTML += `
                        <div class="glass-card p-4">
                            <div class="thumb-grid">
                                <div class="thumb" onclick="ver('${s.print1_url}')"><img src="${s.print1_url}"></div>
                                <div class="thumb" onclick="ver('${s.print2_url}')"><img src="${s.print2_url}"></div>
                                <div class="thumb" onclick="ver('${s.print3_url}')"><img src="${s.print3_url}"></div>
                            </div>
                            <h3 class="font-black text-white italic uppercase">${s.nome}</h3>
                            <p class="text-[10px] text-slate-400 mb-4">PIX: ${s.pix_cadastro}</p>
                            <div class="flex gap-2">
                                <button onclick="liberar('${id}','${s.nome}','${s.whatsapp}')" class="flex-1 btn-zap py-3 rounded-lg text-[10px] uppercase">Aprovar e Chamar</button>
                                <button onclick="database.ref('solicitacoes/${id}').remove()" class="bg-red-500/20 text-red-500 px-4 rounded-lg">🗑️</button>
                            </div>
                        </div>`;
                }
            });
            document.getElementById('contador').innerText = count;
            if(count === 0) container.innerHTML = "<p class='text-center text-slate-600 uppercase text-xs'>Tudo limpo!</p>";
        });

        function liberar(id, nome, zap) {
            database.ref('solicitacoes/'+id).update({status:'liberado'}).then(() => {
                const link = `https://galdinofidalgo10.github.io/ajuda-p2p/index.html?user=${encodeURIComponent(nome)}`;
                const msg = encodeURIComponent(`✅ *ACESSO LIBERADO*\n\nOlá ${nome}, seu cadastro foi aprovado!\n\nAcesse seu escritório aqui:\n${link}`);
                window.open(`https://api.whatsapp.com/send?phone=${zap}&text=${msg}`, '_blank');
            });
        }
    </script>
</body>
</html>
