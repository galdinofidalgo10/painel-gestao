<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão Elite | Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #020617; color: #f8fafc; font-family: 'Montserrat', sans-serif; }
        .glass-card { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(212, 175, 55, 0.1); border-radius: 15px; }
        .btn-gold { background: linear-gradient(135deg, #b8860b 0%, #fde047 100%); color: #000; font-weight: 900; }
        .status-pendente { border-left: 4px solid #fde047; }
        .status-liberado { border-left: 4px solid #22c55e; opacity: 0.8; }
        .thumb { width: 100px; height: 120px; object-fit: cover; border-radius: 8px; border: 2px solid #fde047; cursor: pointer; transition: 0.3s; flex-shrink: 0; }
        .thumb:hover { transform: scale(1.05); }
    </style>
</head>
<body class="p-4">
    <div class="max-w-2xl mx-auto">
        <header class="text-center mb-6 pt-4">
            <h1 class="text-2xl font-black italic text-yellow-500 uppercase tracking-tighter">Gestão Elite</h1>
            <p id="contador" class="text-[9px] font-bold text-slate-500 uppercase tracking-widest">Sincronizando Banco de Dados...</p>
        </header>
        <div id="lista" class="space-y-4"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCZIP0M0M8FqC_LAtI9I36e_IIn_V-C4m4",
            authDomain: "ajuda-mutua-7d99a.firebaseapp.com",
            databaseURL: "https://ajuda-mutua-7d99a-default-rtdb.firebaseio.com",
            projectId: "ajuda-mutua-7d99a",
            storageBucket: "ajuda-mutua-7d99a.appspot.com",
            appId: "1:1070775313117:web:fa90f5f0cb519ab38b1d34"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        database.ref('solicitacoes/').on('value', (snap) => {
            const list = document.getElementById('lista');
            list.innerHTML = "";
            let count = 0;
            
            snap.forEach((child) => {
                count++;
                const u = child.val();
                const id = child.key;
                const isLib = u.status === 'liberado';
                
                let fHtml = "";
                if(u.comprovantes) {
                    u.comprovantes.forEach(img => {
                        fHtml += `<img src="${img}" class="thumb" onclick="window.open('${img}')">`;
                    });
                }

                // CORREÇÃO DO LINK: Verifique se a pasta se chama 'cadastro' no seu GitHub
                const linkCadastro = "https://galdinofidalgo10.github.io/ajuda-mutua/cadastro/index.html?n1=" + encodeURIComponent(u.nome) + "&p1=" + encodeURIComponent(u.pix);
                
                const textoZap = encodeURIComponent(`Olá ${u.nome}! Aqui está o seu link de convite para a rede. ✅\n\nEnvie este link para seus indicados se cadastrarem:\n${linkCadastro}`);
                const linkZap = `https://api.whatsapp.com/send?phone=55${u.whatsapp}&text=${textoZap}`;

                list.innerHTML += `
                    <div class="glass-card p-4 ${isLib ? 'status-liberado' : 'status-pendente'}">
                        <div class="flex justify-between items-start mb-3 text-white">
                            <div>
                                <h3 class="font-black text-sm uppercase leading-tight">${u.nome}</h3>
                                <p class="text-[9px] text-yellow-500 font-bold">PIX: ${u.pix}</p>
                                <p class="text-[8px] text-slate-400 italic">Indicado por: ${u.indicado_por || 'Direto'}</p>
                            </div>
                            <div class="flex flex-col gap-2">
                                ${!isLib ? 
                                    `<button onclick="aprovar('${id}')" class="btn-gold px-4 py-2 rounded text-[10px] uppercase shadow-lg shadow-yellow-500/20">Liberar Acesso</button>` : 
                                    `<a href="${linkZap}" target="_blank" class="bg-green-600 text-white px-3 py-2 rounded text-[9px] font-black text-center uppercase">Enviar Link Zap</a>`
                                }
                                <button onclick="remover('${id}')" class="text-red-500/30 text-[8px] font-bold">EXCLUIR</button>
                            </div>
                        </div>
                        <div class="flex gap-2 bg-black/40 p-2 rounded-lg overflow-x-auto border border-white/5">
                            ${fHtml || '<p class="text-[8px] text-slate-600 font-bold uppercase italic">Sem Comprovantes</p>'}
                        </div>
                    </div>`;
            });
            document.getElementById('contador').innerText = count + " USUÁRIOS NO SISTEMA";
        });

        function aprovar(id) { if(confirm("Confirmar ativação?")) database.ref('solicitacoes/'+id).update({status:'liberado'}); }
        function remover(id) { if(confirm("Remover permanentemente?")) database.ref('solicitacoes/'+id).remove(); }
    </script>
</body>
</html>
