<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão Elite | Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #020617; color: #f8fafc; font-family: 'Montserrat', sans-serif; }
        .glass-card { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(212, 175, 55, 0.1); border-radius: 15px; }
        .btn-gold { background: linear-gradient(135deg, #b8860b 0%, #fde047 100%); color: #000; font-weight: 900; }
        .status-pendente { border-left: 4px solid #fde047; }
        .status-liberado { border-left: 4px solid #22c55e; opacity: 0.7; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-2xl mx-auto">
        <header class="text-center mb-8">
            <h1 class="text-2xl font-black italic text-yellow-500 uppercase">Gestão Elite</h1>
            <p id="contador" class="text-[9px] font-bold text-slate-500 tracking-widest">Sincronizando...</p>
        </header>

        <div id="lista-usuarios" class="space-y-4"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "COLE_SUA_CHAVE_AQUI", 
            authDomain: "ajuda-mutua-7d99a.firebaseapp.com",
            databaseURL: "https://ajuda-mutua-7d99a-default-rtdb.firebaseio.com",
            projectId: "ajuda-mutua-7d99a",
            storageBucket: "ajuda-mutua-7d99a.appspot.com",
            appId: "1:1070775313117:web:fa90f5f0cb519ab38b1d34"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        database.ref('solicitacoes/').on('value', (snapshot) => {
            const container = document.getElementById('lista-usuarios');
            container.innerHTML = "";
            let total = 0;

            snapshot.forEach((child) => {
                total++;
                const user = child.val();
                const id = child.key;
                const isLiberado = user.status === 'liberado';

                container.innerHTML += `
                    <div class="glass-card p-4 flex justify-between items-center ${isLiberado ? 'status-liberado' : 'status-pendente'}">
                        <div>
                            <h3 class="font-black text-xs uppercase">${user.nome}</h3>
                            <p class="text-[10px] text-yellow-500 font-bold">PIX: ${user.pix}</p>
                            ${user.comprovantes ? `
                                <button onclick="abrirFotos('${user.comprovantes.join('|')}')" class="mt-2 bg-blue-600 text-white text-[9px] px-2 py-1 rounded">👁️ VER FOTOS</button>
                            ` : ''}
                        </div>
                        <div class="flex gap-2">
                            ${!isLiberado ? `<button onclick="liberar('${id}')" class="btn-gold px-3 py-2 rounded text-[9px]">LIBERAR</button>` : `<span class="text-green-500 text-[9px] font-bold">ATIVO</span>`}
                            <button onclick="remover('${id}')" class="bg-red-600 text-white px-3 py-2 rounded text-[9px]">X</button>
                        </div>
                    </div>
                `;
            });
            document.getElementById('contador').innerText = total + " REGISTROS";
        });

        function abrirFotos(lista) {
            lista.split('|').forEach(img => {
                const win = window.open();
                win.document.write(`<body style="margin:0;background:#000;display:flex;align-items:center;justify-content:center;"><img src="${img}" style="max-width:100%;border:4px solid #d4af37;"></body>`);
            });
        }

        function liberar(id) { if(confirm("Liberar?")) database.ref('solicitacoes/'+id).update({status:'liberado'}); }
        function remover(id) { if(confirm("Apagar?")) database.ref('solicitacoes/'+id).remove(); }
    </script>
</body>
</html>
