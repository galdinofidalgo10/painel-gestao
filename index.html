<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão Pro | Protocolo Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #020617; color: #f8fafc; font-family: 'Montserrat', sans-serif; }
        .glass-card { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 20px; }
        .btn-approve { background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: white; font-weight: 900; }
        .btn-delete { background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%); color: white; font-weight: 900; }
        .btn-pending { background: #1e293b; color: #94a3b8; }
        
        /* Thumbnail do Print */
        .img-preview-container { width: 120px; height: 120px; border-radius: 15px; overflow: hidden; border: 2px solid #b8860b; background: #000; cursor: pointer; position: relative; }
        .img-preview-container img { width: 100%; height: 100%; object-fit: cover; transition: 0.3s; }
        .img-preview-container:hover img { transform: scale(1.1); opacity: 0.8; }
        .img-preview-container::after { content: 'VER'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 10px; font-weight: 900; color: #fde047; opacity: 0; transition: 0.3s; }
        .img-preview-container:hover::after { opacity: 1; }

        /* Modal do Zoom (Lightbox) */
        #modalZoom { display: none; position: fixed; z-index: 1000; inset: 0; background: rgba(0,0,0,0.95); align-items: center; justify-content: center; padding: 20px; }
        #modalZoom img { max-width: 100%; max-height: 90vh; border-radius: 10px; border: 3px solid #fde047; box-shadow: 0 0 30px rgba(253, 224, 71, 0.2); }
        #modalZoom .close { position: absolute; top: 20px; right: 20px; color: white; font-size: 40px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div id="modalZoom" onclick="fecharZoom()">
        <span class="close">&times;</span>
        <img id="imgFull" src="">
    </div>

    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-10 border-b border-white/5 pb-6">
            <div>
                <h1 class="text-3xl font-black text-yellow-500 uppercase italic">Gestão Elite</h1>
                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-[0.4em] mt-1">Conferência de Comprovantes</p>
            </div>
            <div class="text-right">
                <span id="contador" class="text-4xl font-black text-white leading-none">0</span>
                <p class="text-[8px] text-yellow-500 font-black uppercase">Fila</p>
            </div>
        </header>

        <div class="flex gap-2 mb-8">
            <button onclick="renderizar('pendente')" class="btn-pending px-6 py-3 rounded-xl text-[10px] font-black uppercase italic hover:text-white transition-all">Pendentes</button>
            <button onclick="renderizar('liberado')" class="btn-pending px-6 py-3 rounded-xl text-[10px] font-black uppercase italic hover:text-white transition-all">Liberados</button>
        </div>

        <div id="listaSolicitacoes" class="space-y-4">
            </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCZIP0M0M8FqC_LAtI9I36e_IIn_V-C4m4",
            authDomain: "ajuda-mutua-7d99a.firebaseapp.com",
            databaseURL: "https://ajuda-mutua-7d99a-default-rtdb.firebaseio.com",
            projectId: "ajuda-mutua-7d99a",
            storageBucket: "ajuda-mutua-7d99a.appspot.com",
            appId: "1:1070775313117:web:fa90f5f0cb519ab38b1d34"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let todasSolicitacoes = {};
        window.filtroAtual = 'pendente';

        database.ref('solicitacoes/').on('value', (snapshot) => {
            todasSolicitacoes = snapshot.val() || {};
            renderizar(window.filtroAtual);
        });

        function abrirZoom(url) {
            document.getElementById('imgFull').src = url;
            document.getElementById('modalZoom').style.display = 'flex';
        }

        function fecharZoom() {
            document.getElementById('modalZoom').style.display = 'none';
        }

        function renderizar(filtro) {
            window.filtroAtual = filtro;
            const container = document.getElementById('listaSolicitacoes');
            container.innerHTML = "";
            let cont = 0;

            Object.keys(todasSolicitacoes).reverse().forEach(id => {
                const item = todasSolicitacoes[id];
                if (item.status === filtro) {
                    cont++;
                    // Usar o campo print_url que vem do formulário
                    const urlFoto = item.print_url || "https://placehold.co/400x600/020617/b8860b?text=SEM+IMAGEM";
                    
                    const card = `
                        <div class="glass-card p-4 md:p-6 flex flex-col md:flex-row items-center gap-6 border-l-4 ${item.status === 'liberado' ? 'border-green-500' : 'border-yellow-500'}">
                            
                            <div class="img-preview-container shadow-2xl" onclick="abrirZoom('${urlFoto}')">
                                <img src="${urlFoto}" loading="lazy">
                            </div>

                            <div class="flex-1 text-center md:text-left">
                                <h3 class="font-black text-white uppercase italic text-lg mb-1">${item.nome}</h3>
                                <div class="space-y-1 text-[11px] font-bold">
                                    <p class="text-slate-400 uppercase">WhatsApp: <span class="text-white">${item.whatsapp}</span></p>
                                    <p class="text-slate-400 uppercase">Indicado por: <span class="text-yellow-500">${item.referencia || 'Direto'}</span></p>
                                    <p class="text-slate-500 text-[9px] uppercase">Data: ${item.data || '--/--/--'}</p>
                                </div>
                            </div>

                            <div class="flex flex-col gap-2 w-full md:w-[200px]">
                                ${item.status === 'pendente' ? `
                                    <button onclick="aprovar('${id}', '${item.nome}', '${item.whatsapp}')" class="btn-approve py-4 rounded-xl text-[10px] uppercase shadow-lg shadow-green-900/20 active:scale-95 transition-all">Liberar Membro</button>
                                    <button onclick="excluir('${id}', '${item.nome}')" class="bg-red-500/10 text-red-500 py-3 rounded-xl text-[9px] uppercase font-black border border-red-500/20 hover:bg-red-500 hover:text-white transition-all">Excluir</button>
                                ` : `
                                    <button onclick="recomendar('${item.nome}', '${item.whatsapp}')" class="bg-white/5 text-white py-4 rounded-xl text-[10px] uppercase font-black border border-white/10">Reenviar Link</button>
                                    <button onclick="excluir('${id}', '${item.nome}')" class="btn-delete py-3 rounded-xl text-[9px] uppercase shadow-lg active:scale-95 transition-all">Excluir Permanente</button>
                                `}
                            </div>
                        </div>
                    `;
                    container.innerHTML += card;
                }
            });
            document.getElementById('contador').innerText = cont;
        }

        // Funções de Ação (Aprovar, Recomendar, Excluir)
        function aprovar(id, nome, zap) {
            if(!confirm(`Confirma o pagamento de ${nome}?`)) return;
            database.ref('solicitacoes/'+id).update({status:'liberado'})
            .then(() => recomendar(nome, zap));
        }

        function recomendar(nome, zap) {
            const link = `https://galdinofidalgo10.github.io/ajuda-p2p/index.html?user=${encodeURIComponent(nome)}`;
            const msg = encodeURIComponent(`🚀 *ACESSO LIBERADO: PROTOCOLO ELITE*\n\nOlá *${nome}*, seu comprovante foi validado!\n\nSeu escritório está pronto:\n👉 ${link}`);
            window.open(`https://api.whatsapp.com/send?phone=${zap}&text=${msg}`, '_blank');
        }

        function excluir(id, nome) {
            if(!confirm(`Deseja apagar os dados de ${nome}?`)) return;
            database.ref('solicitacoes/'+id).remove();
        }
    </script>
</body>
</html>
