<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Direto</title>
    <style>
        body { font-family: sans-serif; background-color: #000; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { border: 2px solid #d4af37; padding: 40px; border-radius: 20px; width: 320px; text-align: center; background: #0a0a0a; box-shadow: 0 0 20px rgba(212, 175, 55, 0.4); }
        h2 { color: #d4af37; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 2px; }
        .icon { font-size: 50px; margin-bottom: 20px; }
        button { width: 100%; padding: 15px; background-color: #d4af37; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: #000; font-size: 18px; transition: 0.3s; }
        button:hover { background-color: #f1c40f; transform: scale(1.05); }
        p { color: #aaa; font-size: 14px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="card">
    <div class="icon">🔓</div>
    <h2>BEM-VINDO</h2>
    <p>Clique abaixo para acessar o sistema de Ajuda Mútua.</p>
    <button onclick="entrar()">ENTRAR NO SISTEMA</button>
</div>

<script>
    function entrar() {
        // Redireciona direto para o seu projeto principal
        window.location.href = "https://galdinofidalgo10.github.io/ajuda-mutua/index.html";
    }
</script>

</body>
</html>
