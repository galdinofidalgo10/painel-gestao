<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão | Protocolo Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #020617; color: #f8fafc; font-family: 'Montserrat', sans-serif; }
        .glass-card { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 15px; }
        .btn-approve { background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: white; font-weight: 900; }
        .btn-pending { background: #1e293b; color: #94a3b8; }
        .status-badge { font-size: 9px; padding: 2px 8px; border-radius: 50px; font-weight: 900; uppercase; }
    </style>
</head>
<body class="p-6">

    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-2xl font-black text-yellow-500 uppercase italic">Painel de Gestão</h1>
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Protocolo Elite v2.0</p>
            </div>
            <div class="text-right">
                <span id="contador" class="text-2xl font-black text-white">0</span>
                <p class="text-[8px] text-yellow-500 font-bold uppercase">Solicitações</p>
            </div>
        </header>

        <div class="flex gap-2 mb-6">
            <button onclick="renderizar('pendente')" class="btn-pending px-4 py-2 rounded-lg text-[10px] font-black uppercase">Pendentes</button>
            <button onclick="renderizar('liberado')" class="btn-pending px-4 py-2 rounded-lg text-[10px] font-black uppercase">Liberados</button>
        </div>

        <div id="listaSolicitacoes" class="space-y-4">
            <p class="text-center py-10 text-slate-500 animate-pulse uppercase text-xs">Carregando dados do Firebase...</p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCZIP0M0M8FqC_LAtI9I36e_IIn_V-C4m4",
            authDomain: "ajuda-mutua-7d99a.firebaseapp.com",
            databaseURL: "https://ajuda-mutua-7d99a-default-rtdb.firebaseio.com",
            projectId: "ajuda-mutua-7d99a",
            storageBucket: "ajuda-mutua-7d99a.appspot.com",
            appId: "1:1070775313117:web:fa90f5f0cb519ab38b1d34"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let todasSolicitacoes = {};

        // Escuta o banco de dados em tempo real
        database.ref('solicitacoes/').on('value', (snapshot) => {
            todasSolicitacoes = snapshot.val() || {};
            renderizar('pendente');
        });

        function renderizar(filtro) {
            const container = document.getElementById('listaSolicitacoes');
            container.innerHTML = "";
            let cont = 0;

            Object.keys(todasSolicitacoes).reverse().forEach(id => {
                const item = todasSolicitacoes[id];
                
                if (item.status === filtro) {
                    cont++;
                    const card = `
                        <div class="glass-card p-5 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 border-l-4 ${item.status === 'liberado' ? 'border-green-500' : 'border-yellow-500'}">
                            <div>
                                <div class="flex items-center gap-2 mb-1">
                                    <h3 class="font-black text-white uppercase text-sm">${item.nome}</h3>
                                    <span class="status-badge ${item.status === 'liberado' ? 'bg-green-500/20 text-green-500' : 'bg-yellow-500/20 text-yellow-500'}">${item.status}</span>
                                </div>
                                <p class="text-[10px] text-slate-400 font-mono">WhatsApp: ${item.whatsapp} | Data: ${item.data}</p>
                            </div>
                            
                            <div class="flex gap-2 w-full md:w-auto">
                                ${item.status === 'pendente' ? 
                                    `<button onclick="aprovarMembro('${id}', '${item.nome}', '${item.whatsapp}')" class="btn-approve flex-1 md:flex-none px-6 py-3 rounded-xl text-[10px] uppercase">Liberar e Enviar Link</button>` : 
                                    `<button onclick="recomendarLink('${item.nome}', '${item.whatsapp}')" class="bg-slate-700 text-white px-6 py-3 rounded-xl text-[10px] uppercase font-black">Reenviar Link</button>`
                                }
                            </div>
                        </div>
                    `;
                    container.innerHTML += card;
                }
            });

            document.getElementById('contador').innerText = cont;
            if(cont === 0) container.innerHTML = `<p class="text-center py-10 text-slate-600 uppercase text-[10px]">Nenhum registro encontrado em "${filtro}".</p>`;
        }

        function aprovarMembro(idFirebase, nome, telefone) {
            if(!confirm(`Deseja liberar o acesso para ${nome}?`)) return;

            // 1. Atualiza no Firebase para destravar o escritório dele
            database.ref('solicitacoes/' + idFirebase).update({
                status: 'liberado'
            }).then(() => {
                recomendarLink(nome, telefone);
            }).catch(err => alert("Erro ao atualizar: " + err));
        }

        function recomendarLink(nome, telefone) {
            // 2. Gera o link do Escritório Virtual (ajuda-p2p)
            const linkEscritorio = `https://galdinofidalgo10.github.io/ajuda-p2p/escritorio.html?user=${encodeURIComponent(nome)}`;
            
            // 3. Prepara a mensagem de boas-vindas
            const texto = encodeURIComponent(
                `🚀 *ACESSO LIBERADO - PROTOCOLO ELITE* 🚀\n\n` +
                `Olá *${nome}*, sua ativação foi concluída com sucesso!\n\n` +
                `Seu Escritório Virtual já está disponível. Acesse para gerenciar sua rede e pegar seu link de convite:\n\n` +
                `👉 ${linkEscritorio}\n\n` +
                `*Sucesso na sua jornada!*`
            );

            // 4. Abre o WhatsApp com o link
            window.open(`https://api.whatsapp.com/send?phone=55${telefone}&text=${texto}`, '_blank');
        }
    </script>
</body>
</html>
