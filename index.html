<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro | Protocolo Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #020617; color: #f8fafc; font-family: 'Montserrat', sans-serif; }
        .glass-input { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 12px; width: 100%; padding: 12px; outline: none; }
        .btn-send { background: linear-gradient(135deg, #b8860b 0%, #fde047 100%); color: #000; font-weight: 900; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-md mx-auto">
        <h1 class="text-2xl font-black text-yellow-500 uppercase italic mb-6">Finalizar Cadastro</h1>
        
        <div class="space-y-4">
            <input type="text" id="nome" placeholder="Seu Nome Completo" class="glass-input">
            <input type="number" id="whatsapp" placeholder="Seu WhatsApp (com DDD)" class="glass-input">
            
            <div class="p-4 border border-dashed border-yellow-500/30 rounded-2xl bg-white/5">
                <p class="text-[10px] font-black text-yellow-500 mb-4 uppercase tracking-widest text-center">Anexe os 3 comprovantes PIX</p>
                <div class="space-y-3">
                    <input type="file" id="p1" accept="image/*" class="text-[10px]">
                    <input type="file" id="p2" accept="image/*" class="text-[10px]">
                    <input type="file" id="p3" accept="image/*" class="text-[10px]">
                </div>
            </div>

            <button onclick="enviarCadastro()" id="btnEnvio" class="btn-send w-full py-4 rounded-xl uppercase italic shadow-lg active:scale-95 transition-all">Enviar para Ativação</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCZIP0M0M8FqC_LAtI9I36e_IIn_V-C4m4",
            authDomain: "ajuda-mutua-7d99a.firebaseapp.com",
            databaseURL: "https://ajuda-mutua-7d99a-default-rtdb.firebaseio.com",
            projectId: "ajuda-mutua-7d99a",
            storageBucket: "ajuda-mutua-7d99a.appspot.com",
            appId: "1:1070775313117:web:fa90f5f0cb519ab38b1d34"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Converte imagem em texto para o Firebase ler depois
        function processarImg(input) {
            return new Promise((resolve) => {
                const file = input.files[0];
                if (!file) resolve(null);
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.readAsDataURL(file);
            });
        }

        async function enviarCadastro() {
            const btn = document.getElementById('btnEnvio');
            btn.innerText = "PROCESSANDO IMAGENS...";
            btn.disabled = true;

            const img1 = await processarImg(document.getElementById('p1'));
            const img2 = await processarImg(document.getElementById('p2'));
            const img3 = await processarImg(document.getElementById('p3'));

            const dados = {
                nome: document.getElementById('nome').value,
                whatsapp: document.getElementById('whatsapp').value,
                referencia: new URLSearchParams(window.location.search).get('ref') || 'Direto',
                print1_url: img1,
                print2_url: img2,
                print3_url: img3,
                status: 'pendente',
                data: new Date().toLocaleString('pt-BR')
            };

            database.ref('solicitacoes/').push(dados).then(() => {
                alert("Sucesso! Aguarde a conferência dos seus prints.");
                window.location.reload();
            });
        }
    </script>
</body>
</html>
