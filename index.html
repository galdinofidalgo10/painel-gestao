<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão Elite | Protocolo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #020617; color: #f8fafc; font-family: 'Montserrat', sans-serif; }
        .glass-card { background: rgba(15, 23, 42, 0.9); border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 20px; }
        .print-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; width: 100%; max-width: 280px; }
        .thumb { aspect-ratio: 3/4; border-radius: 10px; overflow: hidden; border: 2px solid #b8860b; background: #000; cursor: pointer; }
        .thumb img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Modal Zoom */
        #modalZoom { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 9999; align-items: center; justify-content: center; flex-direction: column; }
        #modalZoom img { max-width: 90%; max-height: 80vh; border: 2px solid #fde047; border-radius: 10px; }

        .btn-zap { background: linear-gradient(135deg, #25d366 0%, #128c7e 100%); color: white; font-weight: 900; }
        .btn-delete { background: #ef4444; color: white; font-weight: 900; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div id="modalZoom" onclick="this.style.display='none'">
        <img id="imgFull" src="">
        <button class="mt-6 bg-white text-black px-6 py-2 rounded-full font-bold uppercase text-[10px]">Fechar</button>
    </div>

    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-10 pb-6 border-b border-white/10">
            <h1 class="text-2xl font-black text-yellow-500 uppercase italic">Gestão de Prints</h1>
            <div id="contador" class="text-3xl font-black">0</div>
        </header>

        <div id="lista" class="space-y-6">
            </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCZIP0M0M8FqC_LAtI9I36e_IIn_V-C4m4",
            authDomain: "ajuda-mutua-7d99a.firebaseapp.com",
            databaseURL: "https://ajuda-mutua-7d99a-default-rtdb.firebaseio.com",
            projectId: "ajuda-mutua-7d99a",
            storageBucket: "ajuda-mutua-7d99a.appspot.com",
            appId: "1:1070775313117:web:fa90f5f0cb519ab38b1d34"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function abrir(url) {
            if(!url) return;
            document.getElementById('imgFull').src = url;
            document.getElementById('modalZoom').style.display = 'flex';
        }

        database.ref('solicitacoes/').on('value', (snap) => {
            const list = document.getElementById('lista');
            list.innerHTML = "";
            let cont = 0;
            const dados = snap.val() || {};

            Object.keys(dados).reverse().forEach(id => {
                const item = dados[id];
                if(item.status === 'pendente') {
                    cont++;
                    list.innerHTML += `
                        <div class="glass-card p-5 flex flex-col md:flex-row gap-6 items-center">
                            <div class="print-grid">
                                <div class="thumb" onclick="abrir('${item.print1_url}')"><img src="${item.print1_url || ''}"></div>
                                <div class="thumb" onclick="abrir('${item.print2_url}')"><img src="${item.print2_url || ''}"></div>
                                <div class="thumb" onclick="abrir('${item.print3_url}')"><img src="${item.print3_url || ''}"></div>
                            </div>
                            
                            <div class="flex-1 text-center md:text-left">
                                <h2 class="text-xl font-black uppercase italic">${item.nome}</h2>
                                <p class="text-xs text-slate-400 font-bold mb-4 uppercase">WhatsApp: ${item.whatsapp}</p>
                                
                                <div class="flex flex-col sm:flex-row gap-2">
                                    <button onclick="liberar('${id}','${item.nome}','${item.whatsapp}')" class="btn-zap flex-1 py-4 rounded-xl text-[10px] uppercase shadow-lg active:scale-95">
                                        ✅ Liberar e Enviar Zap
                                    </button>
                                    
                                    <button onclick="remover('${id}')" class="btn-delete px-6 py-4 rounded-xl text-[10px] uppercase shadow-lg active:scale-95">
                                        🗑️ Excluir
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                }
            });
            document.getElementById('contador').innerText = cont;
        });

        function liberar(id, nome, zap) {
            if(!confirm(`Confirmar e enviar link para ${nome}?`)) return;
            database.ref('solicitacoes/'+id).update({status:'liberado'}).then(() => {
                const link = `https://galdinofidalgo10.github.io/ajuda-p2p/index.html?user=${encodeURIComponent(nome)}`;
                const msg = encodeURIComponent(`🚀 *ACESSO LIBERADO: PROTOCOLO ELITE*\n\nOlá *${nome}*, seu acesso foi ativado!\n\nEntre no seu escritório agora:\n👉 ${link}`);
                window.open(`https://api.whatsapp.com/send?phone=${zap}&text=${msg}`, '_blank');
            });
        }

        function remover(id) {
            if(confirm("Deseja apagar esse registro permanentemente?")) {
                database.ref('solicitacoes/'+id).remove();
            }
        }
    </script>
</body>
</html>
