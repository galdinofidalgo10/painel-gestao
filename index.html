<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADM ELITE | Gestão Avançada</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #020617; color: #f8fafc; font-family: 'Montserrat', sans-serif; }
        .glass-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(10px); border: 1px solid rgba(212, 175, 55, 0.1); border-radius: 20px; }
        #auth-screen { background: #020617; position: fixed; inset: 0; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .input-field { width: 100%; background: rgba(30, 41, 59, 0.8); border: 1px solid rgba(212, 175, 55, 0.2); padding: 15px; border-radius: 12px; color: white; outline: none; margin-bottom: 10px; }
        #main-content { display: none; }
    </style>
</head>
<body class="p-6">

    <div id="auth-screen">
        <div class="glass-card p-8 w-full max-w-sm border-t-4 border-yellow-500 shadow-2xl text-center">
            <h2 class="text-yellow-500 font-black mb-6 uppercase tracking-widest text-xl">Acesso Master</h2>
            <input type="email" id="email" placeholder="E-mail" class="input-field">
            <input type="password" id="password" placeholder="Senha" class="input-field">
            <button onclick="fazerLogin()" class="w-full bg-yellow-500 text-black font-black py-4 rounded-lg uppercase mt-4">Entrar</button>
            <button onclick="criarConta()" class="mt-4 text-[10px] text-slate-500 uppercase font-bold">Cadastrar meu e-mail</button>
        </div>
    </div>

    <div id="main-content" class="max-w-4xl mx-auto">
        <header class="mb-10 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black text-yellow-500 italic uppercase">Gestão Elite</h1>
                <p id="user-info" class="text-[9px] text-slate-500 font-bold uppercase"></p>
            </div>
            <button onclick="logout()" class="text-red-500 text-[10px] font-black uppercase border border-red-500/20 px-3 py-1 rounded">Sair</button>
        </header>

        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="glass-card p-4 border-l-4 border-green-500">
                <p class="text-[8px] text-slate-500 font-black uppercase">Ganhos Totais</p>
                <p id="ganhos-total" class="text-xl font-black text-green-500">R$ 0,00</p>
            </div>
            <div class="glass-card p-4 border-l-4 border-yellow-500">
                <p class="text-[8px] text-slate-500 font-black uppercase">Pendentes</p>
                <p id="count" class="text-xl font-black text-yellow-500">0</p>
            </div>
        </div>

        <div id="lista-pendentes" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCZIpVpWjOMtULxM5ZJjG_Kydas2UPE4Lk",
            authDomain: "ajuda-mutua-7d99a.firebaseapp.com",
            databaseURL: "https://ajuda-mutua-7d99a-default-rtdb.firebaseio.com",
            projectId: "ajuda-mutua-7d99a",
            storageBucket: "ajuda-mutua-7d99a.firebasestorage.app",
            messagingSenderId: "1070775313117",
            appId: "1:1070775313117:web:fa8095ff0cb519ab38b134"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                document.getElementById('user-info').innerText = "ADM: " + user.email;
                iniciarPainel();
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
                document.getElementById('main-content').style.display = 'none';
            }
        });

        function fazerLogin() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            auth.signInWithEmailAndPassword(e, p).catch(err => alert("Erro no Login: " + err.message));
        }

        function criarConta() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            auth.createUserWithEmailAndPassword(e, p).then(() => alert("Conta criada com sucesso!")).catch(err => alert(err.message));
        }

        function logout() { auth.signOut(); }

        function iniciarPainel() {
            database.ref('solicitacoes/').on('value', snap => {
                const container = document.getElementById('lista-pendentes');
                const data = snap.val();
                let total = 0;
                container.innerHTML = "";
                for (let id in data) {
                    total++;
                    const u = data[id];
                    let val = 5;
                    if(u.nivel && u.nivel.includes("Prata")) val = 10;
                    if(u.nivel && u.nivel.includes("Ouro")) val = 20;

                    container.innerHTML += `
                        <div class="glass-card p-5 border-l-4 border-yellow-500">
                            <div class="flex justify-between items-start mb-2">
                                <h3 class="text-white font-black text-xs uppercase">${u.nome}</h3>
                                <span class="text-[9px] font-bold text-yellow-500">${u.nivel || 'Bronze'}</span>
                            </div>
                            <p class="text-[10px] text-slate-400 font-mono">PIX: ${u.pix}</p>
                            <div class="flex gap-2 mt-4">
                                <button onclick="confirmar('${id}', ${val})" class="flex-1 bg-green-600 text-white text-[9px] font-black py-2 rounded">ATIVAR R$${val}</button>
                                <button onclick="zap('${u.pix}', '${u.nome}')" class="bg-blue-600 text-white px-3 py-2 rounded text-[9px]">ZAP</button>
                            </div>
                        </div>`;
                }
                document.getElementById('count').innerText = total;
            });

            database.ref('financeiro/total').on('value', snap => {
                const val = snap.val() || 0;
                document.getElementById('ganhos-total').innerText = "R$ " + val.toLocaleString('pt-BR', {minimumFractionDigits: 2});
            });
        }

        function confirmar(id, valor) {
            if(confirm("Confirmar recebimento?")) {
                database.ref('financeiro/total').transaction(c => (c || 0) + valor);
                database.ref('solicitacoes/' + id).remove();
            }
        }

        function zap(tel, nome) {
            const msg = window.encodeURIComponent(`Olá ${nome}, seu pagamento foi confirmado!`);
            window.open(`https://api.whatsapp.com/send?phone=55${tel.replace(/\D/g,'')}&text=${msg}`);
        }
    </script>
</body>
</html>
