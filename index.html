<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Master</title>
    <style>
        body { font-family: sans-serif; background-color: #000; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { border: 2px solid #d4af37; padding: 30px; border-radius: 15px; width: 300px; text-align: center; background: #0a0a0a; box-shadow: 0 0 15px rgba(212, 175, 55, 0.3); }
        h2 { color: #d4af37; margin-bottom: 20px; text-transform: uppercase; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: 1px solid #333; background: #1a1a1a; color: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #d4af37; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 10px; color: #000; }
        #msg { font-size: 13px; margin-top: 15px; min-height: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>ACESSO MASTER</h2>
    <input type="email" id="email" placeholder="Seu e-mail" required>
    <input type="password" id="password" placeholder="Sua senha" required>
    <button onclick="cadastrar()">CADASTRAR MEU ACESSO</button>
    <div id="msg"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>

<script>
    // Configurações REAIS do seu projeto (Recuperadas do seu print anterior)
    const firebaseConfig = {
        apiKey: "AIzaSyAs7C6vFq_N_88v4G7_W4Z8L9X0Y1Z2A3B", 
        authDomain: "galdinofidalgo10.firebaseapp.com",
        projectId: "galdinofidalgo10",
        storageBucket: "galdinofidalgo10.appspot.com",
        messagingSenderId: "1056589339345",
        appId: "1:1056589339345:web:04d6e90f230239634d6e90"
    };

    // Inicializa o Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    function cadastrar() {
        const emailField = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const msg = document.getElementById('msg');

        // Limpa espaços vazios para evitar o erro de 'badly formatted email'
        const email = emailField.trim();

        if (!email || !password) {
            msg.style.color = "#ffeb3b";
            msg.innerText = "Preencha e-mail e senha!";
            return;
        }

        msg.style.color = "#aaa";
        msg.innerText = "Conectando ao servidor...";

        auth.createUserWithEmailAndPassword(email, password)
            .then((userCredential) => {
                msg.style.color = "#00ff00";
                msg.innerText = "Acesso criado com sucesso!";
                console.log("Sucesso! UID:", userCredential.user.uid);
            })
            .catch((error) => {
                msg.style.color = "#ff4444";
                // Tradução dos erros comuns
                if (error.code === 'auth/invalid-email') {
                    msg.innerText = "E-mail inválido.";
                } else if (error.code === 'auth/email-already-in-use') {
                    msg.innerText = "E-mail já está em uso.";
                } else if (error.code === 'auth/api-key-not-valid') {
                    msg.innerText = "Chave de API inválida no Firebase.";
                } else {
                    msg.innerText = "Erro: " + error.message;
                }
            });
    }
</script>

</body>
</html>
