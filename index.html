<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão Elite | 3 PIX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #020617; color: #f8fafc; font-family: 'Montserrat', sans-serif; }
        .glass-card { background: rgba(15, 23, 42, 0.95); border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 20px; }
        .thumb-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        .thumb { aspect-ratio: 3/4; border-radius: 8px; overflow: hidden; border: 1px solid #b8860b; background: #000; cursor: pointer; }
        .thumb img { width: 100%; height: 100%; object-fit: cover; }
        
        #modalZoom { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 9999; align-items: center; justify-content: center; flex-direction: column; }
        #modalZoom img { max-width: 90%; max-height: 75vh; border: 2px solid #fde047; border-radius: 10px; }
    </style>
</head>
<body class="p-4">

    <div id="modalZoom" onclick="this.style.display='none'">
        <img id="imgFull" src="">
        <button class="mt-8 bg-white text-black px-10 py-3 rounded-full font-black uppercase text-xs">FECHAR</button>
    </div>

    <div class="max-w-xl mx-auto">
        <header class="flex justify-between items-center mb-8 py-4 border-b border-white/10">
            <h1 class="text-xl font-black text-yellow-500 uppercase italic">Gestão de Prints</h1>
            <div id="contador" class="text-2xl font-black">0</div>
        </header>

        <div id="lista" class="space-y-6">
            <p class="text-center text-slate-500 text-xs uppercase animate-pulse">Carregando registros...</p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCZIP0M0M8FqC_LAtI9I36e_IIn_V-C4m4",
            authDomain: "ajuda-mutua-7d99a.firebaseapp.com",
            databaseURL: "https://ajuda-mutua-7d99a-default-rtdb.firebaseio.com",
            projectId: "ajuda-mutua-7d99a",
            storageBucket: "ajuda-mutua-7d99a.appspot.com",
            appId: "1:1070775313117:web:fa90f5f0cb519ab38b1d34"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function abrir(url) {
            if(!url || url.length < 100) return alert("Imagem não carregou corretamente no envio.");
            document.getElementById('imgFull').src = url;
            document.getElementById('modalZoom').style.display = 'flex';
        }

        database.ref('solicitacoes/').on('value', (snap) => {
            const list = document.getElementById('lista');
            list.innerHTML = "";
            let cont = 0;
            const dados = snap.val() || {};

            Object.keys(dados).reverse().forEach(id => {
                const item = dados[id];
                if(item.status === 'pendente') {
                    cont++;
                    list.innerHTML += `
                        <div class="glass-card p-4 border-l-4 border-yellow-500">
                            <div class="thumb-grid">
                                <div class="thumb" onclick="abrir('${item.print1_url}')"><img src="${item.print1_url || ''}"></div>
                                <div class="thumb" onclick="abrir('${item.print2_url}')"><img src="${item.print2_url || ''}"></div>
                                <div class="thumb" onclick="abrir('${item.print3_url}')"><img src="${item.print3_url || ''}"></div>
                            </div>
                            <h2 class="font-black uppercase italic text-lg text-white mb-1">${item.nome}</h2>
                            <p class="text-[10px] text-slate-400 font-bold mb-4">WHATSAPP: ${item.whatsapp}</p>
                            
                            <div class="flex gap-2">
                                <button onclick="liberar('${id}','${item.nome}','${item.whatsapp}')" class="flex-1 bg-green-600 py-4 rounded-xl text-[10px] font-black uppercase">Liberar e Enviar Zap</button>
                                <button onclick="remover('${id}')" class="bg-red-600 px-4 rounded-xl text-[10px] font-black uppercase italic">🗑️</button>
                            </div>
                        </div>
                    `;
                }
            });
            document.getElementById('contador').innerText = cont;
        });

        function liberar(id, nome, zap) {
            database.ref('solicitacoes/'+id).update({status:'liberado'}).then(() => {
                const link = `https://galdinofidalgo10.github.io/ajuda-p2p/index.html?user=${encodeURIComponent(nome)}`;
                const msg = encodeURIComponent(`🚀 *ACESSO LIBERADO!*\n\nOlá *${nome}*, seu acesso foi ativado.\n\nLink do escritório:\n👉 ${link}`);
                window.open(`https://api.whatsapp.com/send?phone=${zap}&text=${msg}`, '_blank');
            });
        }

        function remover(id) {
            if(confirm("Excluir registro?")) database.ref('solicitacoes/'+id).remove();
        }
    </script>
</body>
</html>
