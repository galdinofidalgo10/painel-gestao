<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão Elite | Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #020617; color: #f8fafc; font-family: 'Montserrat', sans-serif; }
        .glass-card { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(212, 175, 55, 0.1); border-radius: 15px; }
        .btn-gold { background: linear-gradient(135deg, #b8860b 0%, #fde047 100%); color: #000; font-weight: 900; }
        .status-pendente { border-left: 4px solid #fde047; }
        .status-liberado { border-left: 4px solid #22c55e; opacity: 0.7; }
        .thumb-comprovante { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; border: 1px solid rgba(212, 175, 55, 0.3); cursor: pointer; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-2xl mx-auto">
        <header class="text-center mb-6 pt-4">
            <h1 class="text-2xl font-black italic text-yellow-500 uppercase">Gestão Elite</h1>
            <p id="contador" class="text-[9px] font-bold text-slate-500 tracking-widest uppercase italic">Sincronizando banco de dados...</p>
        </header>

        <div id="lista-usuarios" class="space-y-4"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCZIP0M0M8FqC_LAtI9I36e_IIn_V-C4m4",
            authDomain: "ajuda-mutua-7d99a.firebaseapp.com",
            databaseURL: "https://ajuda-mutua-7d99a-default-rtdb.firebaseio.com",
            projectId: "ajuda-mutua-7d99a",
            storageBucket: "ajuda-mutua-7d99a.appspot.com",
            appId: "1:1070775313117:web:fa90f5f0cb519ab38b1d34"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        database.ref('solicitacoes/').on('value', (snapshot) => {
            const container = document.getElementById('lista-usuarios');
            container.innerHTML = "";
            let total = 0;

            snapshot.forEach((child) => {
                total++;
                const user = child.val();
                const id = child.key;
                const isLiberado = user.status === 'liberado';

                // Criar o HTML das 3 fotos
                let fotosHtml = "";
                if (user.comprovantes && Array.isArray(user.comprovantes)) {
                    user.comprovantes.forEach((img) => {
                        fotosHtml += `<img src="${img}" class="thumb-comprovante" onclick="verGrande('${img}')">`;
                    });
                }

                container.innerHTML += `
                    <div class="glass-card p-4 ${isLiberado ? 'status-liberado' : 'status-pendente'}">
                        <div class="flex justify-between items-start mb-3">
                            <div>
                                <h3 class="font-black text-[12px] uppercase text-white">${user.nome}</h3>
                                <p class="text-[10px] text-yellow-500 font-bold">PIX: ${user.pix}</p>
                                <p class="text-[8px] text-slate-400 italic">${user.data}</p>
                            </div>
                            <div class="flex gap-2">
                                ${!isLiberado ? `<button onclick="liberar('${id}')" class="btn-gold px-3 py-2 rounded text-[9px]">LIBERAR</button>` : `<span class="text-green-500 font-bold text-[9px]">ATIVO</span>`}
                                <button onclick="remover('${id}')" class="bg-red-600/20 text-red-500 border border-red-500/20 px-3 py-2 rounded text-[9px]">X</button>
                            </div>
                        </div>
                        <div class="flex gap-2 mt-2 bg-black/30 p-2 rounded-lg">
                            ${fotosHtml || '<span class="text-[8px] text-red-500 italic">Sem comprovantes</span>'}
                        </div>
                        <p class="text-[7px] text-slate-500 mt-2 italic text-right">Toque na imagem para ampliar</p>
                    </div>
                `;
            });
            document.getElementById('contador').innerText = total + " REGISTROS ENCONTRADOS";
        });

        function verGrande(img) {
            const win = window.open();
            win.document.write(`<body style="margin:0;background:#000;display:flex;align-items:center;justify-content:center;height:100vh;"><img src="${img}" style="max-width:100%;max-height:100%;border:2px solid #fde047;"></body>`);
        }

        function liberar(id) { if(confirm("Confirmar ativação deste usuário?")) database.ref('solicitacoes/'+id).update({status:'liberado'}); }
        function remover(id) { if(confirm("Deseja apagar este registro permanentemente?")) database.ref('solicitacoes/'+id).remove(); }
    </script>
</body>
</html>
