<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gestão Elite | 3 PIX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #020617; color: #f8fafc; font-family: 'Montserrat', sans-serif; }
        .glass-card { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 20px; }
        
        /* Grid de 3 Prints */
        .print-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; max-width: 320px; }
        .img-preview-container { 
            aspect-ratio: 3/4; 
            border-radius: 12px; 
            overflow: hidden; 
            border: 2px solid rgba(212, 175, 55, 0.4); 
            background: #000; 
            cursor: pointer; 
            position: relative;
            z-index: 10;
        }
        .img-preview-container img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
        .img-preview-container:active { transform: scale(0.95); border-color: #fde047; }

        /* MODAL DE ZOOM (CORRIGIDO) */
        #modalZoom { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: rgba(0,0,0,0.98); 
            z-index: 9999; /* Força ficar na frente de tudo */
            align-items: center; 
            justify-content: center; 
            flex-direction: column;
        }
        #modalZoom img { 
            max-width: 95%; 
            max-height: 80vh; 
            border: 2px solid #fde047; 
            border-radius: 8px;
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.3);
        }
        .close-btn { 
            margin-top: 20px; 
            background: #fde047; 
            color: #000; 
            padding: 12px 30px; 
            border-radius: 50px; 
            font-weight: 900; 
            text-transform: uppercase;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="modalZoom">
        <img id="imgFull" src="">
        <div class="close-btn" onclick="fecharZoom()">Fechar Imagem</div>
    </div>

    <div class="max-w-5xl mx-auto p-4">
        <header class="flex justify-between items-center mb-10 py-6 border-b border-white/10">
            <h1 class="text-2xl font-black text-yellow-500 uppercase italic">Painel de Conferência</h1>
            <div id="contador" class="text-3xl font-black text-white">0</div>
        </header>

        <div id="listaSolicitacoes" class="space-y-6">
            </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script>
        // ... sua config do firebase ...
        const firebaseConfig = {
            apiKey: "AIzaSyCZIP0M0M8FqC_LAtI9I36e_IIn_V-C4m4",
            authDomain: "ajuda-mutua-7d99a.firebaseapp.com",
            databaseURL: "https://ajuda-mutua-7d99a-default-rtdb.firebaseio.com",
            projectId: "ajuda-mutua-7d99a",
            storageBucket: "ajuda-mutua-7d99a.appspot.com",
            appId: "1:1070775313117:web:fa90f5f0cb519ab38b1d34"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // FUNÇÕES DE ZOOM
        function abrirZoom(url) {
            console.log("Tentando abrir:", url); // Para teste no console
            const modal = document.getElementById('modalZoom');
            const img = document.getElementById('imgFull');
            img.src = url;
            modal.style.display = 'flex';
        }

        function fecharZoom() {
            document.getElementById('modalZoom').style.display = 'none';
        }

        database.ref('solicitacoes/').on('value', (snap) => {
            const container = document.getElementById('listaSolicitacoes');
            container.innerHTML = "";
            let cont = 0;
            
            const dados = snap.val() || {};
            Object.keys(dados).reverse().forEach(id => {
                const item = dados[id];
                if(item.status === 'pendente') {
                    cont++;
                    const p1 = item.print1_url || "https://placehold.co/400x600/1e293b/fde047?text=PIX+1";
                    const p2 = item.print2_url || "https://placehold.co/400x600/1e293b/fde047?text=PIX+2";
                    const p3 = item.print3_url || "https://placehold.co/400x600/1e293b/fde047?text=PIX+3";

                    container.innerHTML += `
                        <div class="glass-card p-6 flex flex-col md:flex-row gap-6">
                            <div class="print-grid">
                                <div class="img-preview-container" onclick="abrirZoom('${p1}')"><img src="${p1}"></div>
                                <div class="img-preview-container" onclick="abrirZoom('${p2}')"><img src="${p2}"></div>
                                <div class="img-preview-container" onclick="abrirZoom('${p3}')"><img src="${p3}"></div>
                            </div>
                            <div class="flex-1">
                                <h2 class="text-xl font-black uppercase italic">${item.nome}</h2>
                                <p class="text-xs text-slate-400 mt-2">WhatsApp: ${item.whatsapp}</p>
                                <button onclick="aprovar('${id}', '${item.nome}', '${item.whatsapp}')" class="mt-4 w-full bg-green-600 p-4 rounded-xl font-black uppercase text-[10px]">Liberar Acesso</button>
                            </div>
                        </div>
                    `;
                }
            });
            document.getElementById('contador').innerText = cont;
        });

        function aprovar(id, nome, zap) {
            database.ref('solicitacoes/'+id).update({status:'liberado'}).then(() => {
                const link = `https://galdinofidalgo10.github.io/ajuda-p2p/index.html?user=${encodeURIComponent(nome)}`;
                window.open(`https://api.whatsapp.com/send?phone=${zap}&text=Liberado!%20Link:%20${link}`);
            });
        }
    </script>
</body>
</html>
