<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Restrito</title>
    <style>
        body { font-family: sans-serif; background-color: #000; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { border: 2px solid #d4af37; padding: 40px; border-radius: 20px; width: 320px; text-align: center; background: #0a0a0a; box-shadow: 0 0 20px rgba(212, 175, 55, 0.4); }
        h2 { color: #d4af37; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 2px; }
        input { width: 100%; padding: 15px; margin: 15px 0; border-radius: 10px; border: 1px solid #333; background: #1a1a1a; color: #fff; box-sizing: border-box; text-align: center; font-size: 18px; }
        button { width: 100%; padding: 15px; background-color: #d4af37; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: #000; font-size: 16px; }
        #msg { font-size: 14px; margin-top: 20px; font-weight: bold; min-height: 20px; }
    </style>
</head>
<body>

<div class="card">
    <div style="font-size: 40px;">🔑</div>
    <h2>SISTEMA PRIVADO</h2>
    <input type="password" id="senha" placeholder="Digite sua Senha">
    <button onclick="entrar()">LIBERAR ACESSO</button>
    <div id="msg"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

<script>
    // Configurações do seu projeto conforme o print
    const firebaseConfig = {
        apiKey: "AIzaSyCzTpvbMjGMTUIxMbZJjd_Kydas", 
        authDomain: "ajuda-mutua-7d99a.firebaseapp.com",
        projectId: "ajuda-mutua-7d99a",
        storageBucket: "ajuda-mutua-7d99a.appspot.com",
        messagingSenderId: "1070775313117",
        appId: "1:1070775313117:web:fe8895ff8cb5110cb51f34"
    };

    // Inicialização
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const auth = firebase.auth();

    function entrar() {
        const password = document.getElementById('senha').value;
        const msg = document.getElementById('msg');

        if (!password) {
            msg.style.color = "#ffeb3b";
            msg.innerText = "Por favor, digite a senha.";
            return;
        }

        msg.style.color = "#aaa";
        msg.innerText = "Conectando ao Firebase...";

        // Usando o e-mail que você criou no painel
        const email = "galdinofidalgo10@gmail.com";

        auth.signInWithEmailAndPassword(email, password)
            .then(() => {
                msg.style.color = "#00ff00";
                msg.innerText = "ACESSO LIBERADO! 🔓";
                setTimeout(() => {
                    window.location.href = "https://galdinofidalgo10.github.io/ajuda-mutua/index.html";
                }, 1000);
            })
            .catch((error) => {
                msg.style.color = "#ff4444";
                console.error(error.code);
                if (error.code === 'auth/wrong-password') {
                    msg.innerText = "Senha Incorreta!";
                } else if (error.code === 'auth/too-many-requests') {
                    msg.innerText = "Muitas tentativas. Tente mais tarde.";
                } else {
                    msg.innerText = "Erro: " + error.message;
                }
            });
    }
</script>

</body>
</html>
